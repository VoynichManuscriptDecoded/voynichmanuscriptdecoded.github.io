<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Voynich Manuscript Decoded</title>
  <style>
    body {
      margin: 0;
      background-color: #0c0c0c;
      font-family: Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      color: #d4af37;
      text-align: center;
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 0.5em;
    }

    p {
      font-size: 1.2em;
      margin-bottom: 2em;
      max-width: 800px;
      padding: 0 20px;
    }

    #book {
      width: 380px;
      max-width: 90%;
      transition: transform 1.5s ease;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
      border-radius: 8px;
    }

    #book.opened {
      transform: rotateY(180deg) scale(1.1);
      transition: transform 1.5s ease;
    }
  </style>
</head>
<body>

  <h1>The Voynich Manuscript Decoded</h1>
  <p>The full decoding of the Voynich Manuscript by Christine Blackburn.<br/>
     Open the manuscript to explore keys, decoded folios, harmonic layers,<br/>
     and cosmological references grounded in Ficinian Neoplatonism.</p>

  <img id="book" src="book-cover.png" alt="Voynich Manuscript Book" />

  <script>
    const book = document.getElementById('book');
    book.addEventListener('click', () => {
      book.classList.add('opened');
      setTimeout(() => {
        window.location.href = "main.html";
      }, 1500);
    });
  </script>

</body>
</html>
