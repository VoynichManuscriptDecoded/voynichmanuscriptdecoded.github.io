<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Voynich Manuscript Decoded</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0e0e0e;
      font-family: 'Georgia', serif;
      color: #f3f0e6;
      overflow: hidden;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    .book {
      width: 600px;
      height: auto;
      transition: transform 1.5s ease;
      cursor: pointer;
    }

    .book.opened {
      transform: scale(0.95) rotateY(180deg);
    }

    .title-block {
      max-width: 800px;
      text-align: center;
      margin-bottom: 40px;
    }

    .title-block h1 {
      font-size: 2.8em;
      margin-bottom: 10px;
      color: #e7dca7;
    }

    .title-block p {
      font-size: 1.2em;
      line-height: 1.6;
      color: #d6d2c4;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-block">
      <h1>The Voynich Manuscript Decoded</h1>
      <p>The full decoding of the Voynich manuscript by Christine Blackburn. Open the manuscript to explore keys, decoded folios, harmonic layers, and cosmological references grounded in Ficinian Neoplatonism.</p>
    </div>
    <img src="book-cover.png" alt="Voynich Manuscript Cover" class="book" id="bookCover">
  </div>

  <script>
    const book = document.getElementById('bookCover');
    book.addEventListener('click', () => {
      book.classList.add('opened');
      setTimeout(() => {
        window.location.href = 'index.html'; // Where your main site index will go
      }, 1600);
    });
  </script>
</body>
</html>
